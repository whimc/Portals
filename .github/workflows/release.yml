---
name: "Release"

on:
  push:
    branches:
      - "master"

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin

      - name: Generate ~/.m2/settings.xml
        uses: whelk-io/maven-settings-xml-action@v14
        with:
          servers: '[{ "id": "github", "username": "${{ github.actor }}", "password": "${{ secrets.GITHUB_TOKEN }}" }]'

      - name: Publish Release
        run: mvn clean package de.jutzig:github-release-plugin:release

      - name: Bump version for next release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mvn build-helper:parse-version versions:set \
            -DnewVersion=\${parsedVersion.majorVersion}.\${parsedVersion.minorVersion}.\${parsedVersion.nextIncrementalVersion}
          mvn versions:commit
          NEW_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          git add pom.xml
          git commit -m "[skip release] Bump version to ${NEW_VERSION}"
          if ! git push; then
            BRANCH="version-bump-${NEW_VERSION}"
            git checkout -b "${BRANCH}"
            git push -u origin "${BRANCH}"
            gh pr create --title "[skip release] Bump version to ${NEW_VERSION}" \
              --body "Automated patch version bump after release." \
              --base master --head "${BRANCH}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
